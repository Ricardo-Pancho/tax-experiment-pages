function checkMismatch(type) {
  var pd = PERSON_DATA[SERVICE];
  var checks = [];
  if (type === 'rent') {
    checks = [
      { id: 'r-address', key: 'rentAddress', label: '租赁房屋坐落地址' },
      { id: 'r-start', key: 'rentStart', label: '租赁时间起' },
      { id: 'r-end', key: 'rentEnd', label: '租赁时间止' },
      { id: 'r-ll-type', key: 'rentLlType', label: '出租方类型' },
      { id: 'r-city', key: 'rentCity', label: '主要工作城市' }
    ];
  }
  if (type === 'edu' && SERVICE === 'simple') {
    checks = [
      { id: 'e-type', key: 'eduType', label: '继续教育类型' },
      { id: 'e-qual-type', key: 'eduQualType', label: '职业资格继续教育类型' },
      { id: 'e-cert-name', key: 'eduCertName', label: '证书名称' },
      { id: 'e-cert-date', key: 'eduCertDate', label: '发证日期' },
      { id: 'e-cert-no', key: 'eduCertNo', label: '证书编号' },
      { id: 'e-issuer', key: 'eduIssuer', label: '发证机关' }
    ];
  }
  if (type === 'edu' && SERVICE === 'complex') {
    checks = [
      { id: 'e-type', key: 'eduType', label: '继续教育类型' },
      { id: 'e-level', key: 'eduLevel', label: '学历阶段' },
      { id: 'e-enroll', key: 'eduEnroll', label: '入学时间' },
      { id: 'e-grad', key: 'eduGrad', label: '毕业时间' }
    ];
  }
  if (type === 'children') {
    checks = [
      { id: 'c-ratio', key: 'childrenRatio', label: '本人扣除比例' }
    ];
  }
  if (type === 'housing') {
    checks = [
      { id: 'h-ratio', key: 'housingRatio', label: '本人扣除比例' }
    ];
  }
  if (type === 'elderly') {
    checks = [
      { id: 'el-relation', key: 'elderlyRelation', label: '与本人关系' },
      { id: 'el-only', key: 'elderlyOnly', label: '是否独生子女' }
    ];
  }
  checks.forEach(function(c) {
    var el = document.getElementById(c.id);
    if (!el) return;
    var val = el.value.trim();
    var expected = pd[c.key];
    if (val && expected && val !== expected) {
      TRACK.mismatchFields.push({ type: type, field: c.label, userValue: val, expectedValue: expected });
    }
  });
}

function saveDeduct(type) {
  let valid = true;
  let errorMsg = '请填写完整信息';
  if (type === 'children') {
    ['c-phone','c-id','c-name','c-stage','c-start','c-end','c-country','c-school','c-ratio'].forEach(id => { if (!document.getElementById(id).value.trim()) valid = false; });
  }
  if (type === 'edu') {
    ['e-phone','e-type','e-level','e-enroll','e-grad'].forEach(id => { if (!document.getElementById(id).value.trim()) valid = false; });
  }
  if (type === 'housing') {
    ['h-phone','h-cert-no','h-address','h-bank','h-contract','h-first-date','h-months','h-ratio'].forEach(id => { if (!document.getElementById(id).value.trim()) valid = false; });
    const hProof = document.querySelector('[data-upload-id="h-proof"]');
    if (!hProof || !hProof.classList.contains('uploaded')) valid = false;
  }
  if (type === 'elderly') {
    ['el-id','el-name','el-only'].forEach(id => { if (!document.getElementById(id).value.trim()) valid = false; });
  }
  if (type === 'rent') {
    ['r-phone','r-address','r-start','r-end','r-ll-type','r-city'].forEach(id => { if (!document.getElementById(id).value.trim()) valid = false; });
    const rProof = document.querySelector('[data-upload-id="r-proof"]');
    if (!rProof || !rProof.classList.contains('uploaded')) valid = false;
  }
  if (type === 'infant') {
    if (!document.getElementById('i-child-display') || document.getElementById('i-child-display').textContent === '请选择') valid = false;
    const iProof = document.querySelector('[data-upload-id="i-proof"]');
    if (!iProof || !iProof.classList.contains('uploaded')) valid = false;
  }
  if (type === 'medical') {
    if (!document.getElementById('m-total').value.trim() || !document.getElementById('m-self').value.trim()) valid = false;
    const mProof = document.querySelector('[data-upload-id="m-proof"]');
    if (!mProof || !mProof.classList.contains('uploaded')) valid = false;
  }
  /* 格式校验 */
  if (valid && type === 'rent') {
    if (!validateField('r-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('r-start', 'month')) { errorMsg = '租赁开始时间格式应为：2025年1月'; valid = false; }
    else if (!validateField('r-end', 'month')) { errorMsg = '租赁结束时间格式应为：2025年12月'; valid = false; }
  }
  if (valid && type === 'edu' && SERVICE === 'simple') {
    if (!validateField('e-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('e-cert-date', 'date')) { errorMsg = '发证日期格式应为：2025年5月'; valid = false; }
  }
  if (valid && type === 'children') {
    if (!validateField('c-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('c-id', 'idcard')) { errorMsg = '您输入的子女身份证号格式有误'; valid = false; }
    else if (!validateField('c-start', 'month')) { errorMsg = '教育开始时间格式应为：2025年1月'; valid = false; }
    else if (!validateField('c-end', 'month')) { errorMsg = '教育结束时间格式应为：2025年12月'; valid = false; }
  }
  if (valid && type === 'edu' && SERVICE === 'complex') {
    if (!validateField('e-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('e-enroll', 'month')) { errorMsg = '入学时间格式应为：2025年1月'; valid = false; }
    else if (!validateField('e-grad', 'month')) { errorMsg = '毕业时间格式应为：2025年12月'; valid = false; }
  }
  if (valid && type === 'housing') {
    if (!validateField('h-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('h-first-date', 'date')) { errorMsg = '首次还款日期格式应为：2025年5月1日'; valid = false; }
    else if (!validateField('h-months', 'number')) { errorMsg = '贷款期限应为数字'; valid = false; }
  }
  if (valid && type === 'elderly') {
    if (!validateField('el-phone', 'phone')) { errorMsg = '您输入的手机号格式有误'; valid = false; }
    else if (!validateField('el-id', 'idcard')) { errorMsg = '您输入的被赡养人身份证号格式有误'; valid = false; }
    else if (!validateField('el-co-id', 'idcard')) { errorMsg = '您输入的共同赡养人身份证号格式有误'; valid = false; }
  }
  if (!valid) { TRACK.errorCount++; showToast(errorMsg, 'mini'); return; }
  /* 被动组中不需要的项目也允许保存（用户可能误填） */
  savedDeducts[type] = true;
  /* 保存追踪 */
  if (type === 'rent') TRACK.saveRent = 1;
  if (type === 'edu') TRACK.saveEducation = 1;
  if (type === 'children') TRACK.saveChildEducation = 1;
  if (type === 'housing') TRACK.saveMortgage = 1;
  if (type === 'elderly') TRACK.saveElderly = 1;
  /* 比对用户填写与个人信息卡是否一致 */
  checkMismatch(type);
  /* 检查是否全部完成（只检查必需项目） */
  const requiredTypes = SERVICE === 'simple' ? ['rent', 'edu'] : ['children', 'edu', 'housing', 'elderly'];
  const allDone = requiredTypes.every(k => savedDeducts[k]);
  showToast('保存成功');
  setTimeout(() => {
    showDeclareModal(function() {
      go('home');
      setTimeout(updateBadges, 350);
      if (allDone) setTimeout(() => showExperimentCompleteModal(), 600);
    });
  }, 800);
}

function showToast(msg, cls) {
  document.getElementById('toast-text').textContent = msg;
  var t = document.getElementById('toast');
  var icon = t.querySelector('.success-toast-icon');
  t.className = 'success-toast show' + (cls ? ' ' + cls : '');
  if (icon) icon.style.display = (cls === 'mini') ? 'none' : 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1500);
}

function startSubmitAnimation() {
  var steps = [
    { id: 'step1', status: '正在校验填报信息...', nextDelay: 2000 },
    { id: 'step2', status: '正在提交至税务系统...', nextDelay: 2000 },
    { id: 'step3', status: '提交成功！', nextDelay: 1000 }
  ];
  var current = 0;
  function advance() {
    if (current > 0) {
      document.getElementById(steps[current - 1].id).classList.remove('active');
      document.getElementById(steps[current - 1].id).classList.add('done');
    }
    if (current < steps.length) {
      document.getElementById(steps[current].id).classList.add('active');
      document.getElementById('submitStatus').textContent = steps[current].status;
      var delay = steps[current].nextDelay;
      current++;
      if (current < steps.length) {
        setTimeout(advance, delay);
      } else {
        setTimeout(function() {
          document.getElementById(steps[current - 1].id).classList.remove('active');
          document.getElementById(steps[current - 1].id).classList.add('done');
          document.getElementById('submit-progress').style.display = 'none';
          document.getElementById('submit-success').style.display = 'block';
          TRACK.completed = 1;
        }, delay);
      }
    }
  }
  advance();
}

function copyTrackData() {
  TRACK.durationSec = TRACK.durationSec || Math.round((Date.now() - TRACK.pageLoadTime) / 1000);
  /* 格式化为键值对文本（方便粘贴到见数问卷填空题） */
  var lines = [];
  lines.push('completed:' + TRACK.completed);
  lines.push('duration_sec:' + TRACK.durationSec);
  lines.push('click_count:' + TRACK.clickCount);
  lines.push('copy_count:' + TRACK.copyCount);
  lines.push('open_info_card:' + TRACK.openInfoCard);
  lines.push('open_info_card_count:' + TRACK.openInfoCardCount);
  lines.push('save_rent:' + (TRACK.saveRent !== null ? TRACK.saveRent : ''));
  lines.push('save_education:' + (TRACK.saveEducation !== null ? TRACK.saveEducation : ''));
  lines.push('save_child_education:' + (TRACK.saveChildEducation !== null ? TRACK.saveChildEducation : ''));
  lines.push('save_mortgage:' + (TRACK.saveMortgage !== null ? TRACK.saveMortgage : ''));
  lines.push('save_elderly:' + (TRACK.saveElderly !== null ? TRACK.saveElderly : ''));
  lines.push('error_count:' + TRACK.errorCount);
  lines.push('back_count:' + TRACK.backCount);
  lines.push('wrong_item_click:' + TRACK.wrongItemClick);
  lines.push('policy_view_count:' + TRACK.policyViewCount);
  lines.push('policy_view_duration:' + TRACK.policyViewDuration);
  var text = lines.join('\n');
  var json = JSON.stringify(TRACK);
  /* 控制台输出 */
  console.log('===== 实验数据 =====');
  console.log(text);
  console.log('===================');
  /* 页面显示 */
  var display = document.getElementById('track-data-display');
  if (display) {
    display.style.display = 'block';
    display.textContent = text;
  }
  /* 复制到剪贴板 */
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('数据已复制，请粘贴到问卷中');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;left:-999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('数据已复制，请粘贴到问卷中');
  }
}

function finishAndExit() {
  TRACK.durationSec = TRACK.durationSec || Math.round((Date.now() - TRACK.pageLoadTime) / 1000);
  /* 校验必填表单是否全部完成 */
  var requiredSaves = SERVICE === 'simple'
    ? [TRACK.saveRent, TRACK.saveEducation]
    : [TRACK.saveChildEducation, TRACK.saveEducation, TRACK.saveMortgage, TRACK.saveElderly];
  var unfinished = requiredSaves.filter(function(v) { return v === null; }).length;
  if (unfinished > 0) {
    showToast('您还有未完成的填报项目，请完成后再提交');
    return;
  }
  /* 构建URL参数字符串 */
  var params = [];
  params.push('completed=' + TRACK.completed);
  params.push('duration_sec=' + TRACK.durationSec);
  params.push('click_count=' + TRACK.clickCount);
  params.push('copy_count=' + TRACK.copyCount);
  params.push('open_info_card=' + TRACK.openInfoCard);
  params.push('open_info_card_count=' + TRACK.openInfoCardCount);
  params.push('save_rent=' + (TRACK.saveRent !== null ? TRACK.saveRent : ''));
  params.push('save_education=' + (TRACK.saveEducation !== null ? TRACK.saveEducation : ''));
  params.push('save_child_education=' + (TRACK.saveChildEducation !== null ? TRACK.saveChildEducation : ''));
  params.push('save_mortgage=' + (TRACK.saveMortgage !== null ? TRACK.saveMortgage : ''));
  params.push('save_elderly=' + (TRACK.saveElderly !== null ? TRACK.saveElderly : ''));
  params.push('error_count=' + TRACK.errorCount);
  params.push('back_count=' + TRACK.backCount);
  params.push('wrong_item_click=' + TRACK.wrongItemClick);
  params.push('policy_view_count=' + TRACK.policyViewCount);
  params.push('policy_view_duration=' + TRACK.policyViewDuration);
  /* 页面停留时长 */
  Object.keys(TRACK).forEach(function(k) {
    if (k.indexOf('pageDuration_') === 0 && TRACK[k]) {
      params.push(k.replace('pageDuration_', 'page_duration_') + '=' + TRACK[k]);
    }
  });
  /* 不一致字段 */
  var mismatchStr = TRACK.mismatchFields.map(function(m) { return m.type + ':' + m.field + '=' + encodeURIComponent(m.userValue); }).join(';');
  params.push('mismatch_fields=' + encodeURIComponent(mismatchStr));
  var paramStr = params.join('&');
  /* === 数据回传（三种方式，兼容不同调研平台） ===
     方式1：Credamo.setUrlVar - 直接设置Credamo平台变量
     方式2：postMessage - 向父窗口发送完整数据
     方式3：URL hash - 写入地址栏hash，跨域安全 */
  /* 方式1：Credamo.setUrlVar - 传递实际值 */
  try {
    var credamo = window.Credamo || (window.parent && window.parent.Credamo);
    if (credamo && credamo.setUrlVar) {
      credamo.setUrlVar('completed', String(TRACK.completed));
      credamo.setUrlVar('duration_sec', String(TRACK.durationSec));
      credamo.setUrlVar('click_count', String(TRACK.clickCount));
      credamo.setUrlVar('copy_count', String(TRACK.copyCount));
      credamo.setUrlVar('open_info_card', String(TRACK.openInfoCard));
      credamo.setUrlVar('open_info_card_count', String(TRACK.openInfoCardCount));
      credamo.setUrlVar('save_rent', String(TRACK.saveRent !== null ? TRACK.saveRent : ''));
      credamo.setUrlVar('save_education', String(TRACK.saveEducation !== null ? TRACK.saveEducation : ''));
      credamo.setUrlVar('save_child_education', String(TRACK.saveChildEducation !== null ? TRACK.saveChildEducation : ''));
      credamo.setUrlVar('save_mortgage', String(TRACK.saveMortgage !== null ? TRACK.saveMortgage : ''));
      credamo.setUrlVar('save_elderly', String(TRACK.saveElderly !== null ? TRACK.saveElderly : ''));
      credamo.setUrlVar('error_count', String(TRACK.errorCount));
      credamo.setUrlVar('back_count', String(TRACK.backCount));
      credamo.setUrlVar('wrong_item_click', String(TRACK.wrongItemClick));
      credamo.setUrlVar('policy_view_count', String(TRACK.policyViewCount));
      credamo.setUrlVar('policy_view_duration', String(TRACK.policyViewDuration));
      credamo.setUrlVar('mismatch_fields', mismatchStr);
    }
  } catch(e) {}
  /* 方式2：postMessage - 发送完整数据给父窗口 */
  try {
    window.parent.postMessage({
      type: 'survey_complete',
      source: 'tax_experiment',
      data: Object.assign({}, TRACK),
      paramStr: paramStr
    }, '*');
  } catch(e) {}
  /* 方式3：将数据写入URL hash（不触发页面跳转，跨域安全） */
  try {
    window.location.hash = 'done=1&' + paramStr;
  } catch(e) {}
}
